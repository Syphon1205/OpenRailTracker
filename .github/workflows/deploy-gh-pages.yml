name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare frontend for GitHub Pages
        run: |
          mkdir -p deploy
          cp -r frontend/* deploy/
          mkdir -p deploy/logos
          cp -r logos/* deploy/logos/

      # Set repo secret ORT_API_BACKEND_URL to your hosted backend (e.g. https://openrailtracker-backend.onrender.com)
      # so GitHub Pages uses your API + WebSocket, not a hardcoded default.
      - name: Point site at hosted backend (from secret)
        env:
          ORT_API_BACKEND_URL: ${{ secrets.ORT_API_BACKEND_URL }}
        run: |
          python3 << 'PY'
          import json
          import os
          from pathlib import Path

          url = (os.environ.get("ORT_API_BACKEND_URL") or "").strip().rstrip("/")
          path = Path("deploy/index.html")
          text = path.read_text(encoding="utf-8")
          marker = '    <script src="app.js"></script>'
          if url and marker in text:
              inj = f'    <script>window.ORT_API_BASE = {json.dumps(url)};</script>\n'
              path.write_text(text.replace(marker, inj + marker, 1), encoding="utf-8")
              print("Injected ORT_API_BASE for:", url)
          elif url:
              raise SystemExit("Could not find app.js script tag in deploy/index.html")
          else:
              print("ORT_API_BACKEND_URL not set; using app default (github.io → openrailtracker.app if applicable)")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
