<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome</title>
  <style>
    :root{--bg:#0b1020; --card:#111827; --text:#e2e8f0; --muted:#94a3b8; --accent:#facc15}
    body{margin:0; font-family: Inter, -apple-system, system-ui, sans-serif; background:linear-gradient(135deg,#0b1020,#111827); color:var(--text)}
    .wrap{height:100vh; display:grid; place-items:center; padding:24px}
    .card{max-width:640px; width:100%; background:rgba(17,24,39,.92); border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:28px; box-shadow:0 24px 50px rgba(0,0,0,.45)}
    .row{display:flex; gap:16px; align-items:center}
    h1{margin:0; font-size:28px}
    .muted{color:var(--muted); margin:8px 0 0 0}
    ul{margin:16px 0 0 20px; color:#cbd5e1}
    li{margin:8px 0}
    .actions{display:flex; justify-content:flex-end; margin-top:24px}
    button{background:var(--accent); color:#111827; border:none; border-radius:10px; padding:10px 16px; font-weight:800; cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <img src="./assets/app_icon.svg" alt="OpenRailTracker" width="52" height="52" />
        <div>
          <h1>Welcome to OpenRailTracker</h1>
          <p class="muted">Desktop edition v0.4.0</p>
        </div>
      </div>
      <ul>
        <li>Live passenger rail map with real-time updates</li>
        <li>Metro-themed marker UI and quick filters</li>
        <li>Runs locally with bundled backend server</li>
      </ul>
      <div class="actions">
        <button id="continueBtn">Start tracking</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('continueBtn').addEventListener('click', async () => {
      if (window.ortDesktop?.completeWelcome) {
        await window.ortDesktop.completeWelcome();
      }
    });
  </script>
</body>
</html>
