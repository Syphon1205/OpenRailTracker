<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08101f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>OpenRailTracker</title>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- MAIN APP: sidebar left + map right -->
    <div class="app">

      <!-- LEFT SIDEBAR -->
      <aside class="sidebar" id="sidebar">

        <div class="sidebar-header">
          <div class="brand">
            <h1>OpenRailTracker <span class="app-version">v0.8.0</span></h1>
            <span id="train-count" class="count-badge">0 trains</span>
          </div>
          <div class="header-tools">
            <button id="toggle-search" class="tool-btn" data-active="true" title="Toggle search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button id="refresh" class="tool-btn" title="Refresh">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
            <button id="toggle-settings" class="tool-btn" title="Settings">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>

        <div class="floating-search active">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search trains, routes, stations…" autocomplete="off" />
          <button id="toggle-filters" class="filter-toggle" data-active="false" title="Filters">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
          </button>
        </div>

        <div class="quick-strip" id="quick-strip">
          <button id="quick-live"       class="quick-chip" data-active="false">Live</button>
          <button id="quick-delay"      class="quick-chip" data-active="false">Delayed</button>
          <button id="quick-reset"      class="quick-chip ghost">Reset</button>
          <span   id="quick-live-ratio" class="quick-ratio">--/--</span>
        </div>

        <div class="support-strip">
          <a id="donate-btn" class="donate-btn" href="https://buymeacoffee.com/tannerdavidson" target="_blank" rel="noopener noreferrer">Donate</a>
        </div>

        <div class="filter-panel" id="filter-panel">
          <select id="source">
            <option value="all">All Sources</option>
          </select>
          <select id="status">
            <option value="all">All Statuses</option>
            <option value="on-time">&#x2713; On Time</option>
            <option value="early">&#x26A1; Early</option>
            <option value="late">&#x23F1;&#xFE0F; Late</option>
            <option value="delayed">&#x1F534; Delayed</option>
          </select>
        </div>

        <div id="floating-list" class="train-list-wrap">
          <div id="train-list" class="train-list"></div>
        </div>

      </aside>

      <!-- RIGHT MAP PANE -->
      <div class="map-pane">
        <div id="map" class="map"></div>
        <div id="train-tooltip" class="train-tooltip" aria-hidden="true"></div>

        <div class="map-actions">
          <!-- Toggle rail route lines -->
          <button id="toggle-routes" class="map-btn" data-active="true" title="Toggle rail routes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10a8 8 0 0 1 16 0v10"/><circle cx="8" cy="20" r="2"/><circle cx="16" cy="20" r="2"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
          </button>
          <!-- Toggle stations -->
          <button id="toggle-stations" class="map-btn" data-active="true" title="Toggle stations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 6.9 8 11.7z"/></svg>
          </button>
          <!-- Freight rail overlay -->
          <button id="toggle-freight" class="map-btn" data-active="false" title="Toggle freight rail overlay">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h18"/><path d="M4 14h16l-1-6H5z"/><circle cx="8" cy="19" r="2"/><circle cx="16" cy="19" r="2"/></svg>
          </button>
          <!-- Nearest crossing finder -->
          <button id="btn-nearest-crossing" class="map-btn" title="Find nearest rail crossing">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19L19 5"/><path d="M5 5l14 14"/><path d="M7 3h4v4"/><path d="M13 17h4v4"/></svg>
          </button>
          <!-- Heritage tracker -->
          <button id="toggle-heritage" class="map-btn map-btn-text" title="Heritage Unit Tracker">H</button>
          <!-- Special interest tracker -->
          <button id="toggle-special-interest" class="map-btn map-btn-text" title="Special Interest Tracker">SI</button>
          <!-- Saved trains only -->
          <button id="toggle-saved" class="map-btn" data-active="false" title="Saved trains only">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <!-- Live railcams -->
          <button id="toggle-railcams" class="map-btn" title="Live railcams">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
          <!-- Departure board -->
          <button id="toggle-departure-board" class="map-btn" title="Departure board">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/></svg>
          </button>
          <!-- Fit to trains -->
          <button id="btn-fit-trains" class="map-btn" title="Fit map to all trains">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
          <!-- Locate me -->
          <button id="btn-locate" class="map-btn" title="Find my location">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M22 12h-4M6 12H2M12 6V2M12 22v-4"/><circle cx="12" cy="12" r="8"/></svg>
          </button>
        </div>

        <!-- Delay Queue -->
        <div id="delay-queue" class="delay-queue">
          <div class="dq-header">
            <svg class="dq-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span class="dq-title">Delays</span>
            <span id="dq-count" class="dq-count">0</span>
            <button id="dq-toggle" class="dq-toggle" title="Toggle delay panel" aria-expanded="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            </button>
          </div>
          <div id="dq-body" class="dq-body">
            <div class="dq-empty">No delays reported</div>
          </div>
        </div>

        <div class="status-pill" id="last-updated">Last updated: --</div>
        <div class="contrib-pill" id="contrib-pill">
          <span class="contrib-title">Credits</span>
          <div id="contrib-links" class="contrib-links"></div>
        </div>
      </div>

    </div><!-- /.app -->


    <!-- MODALS (position:fixed, cover full viewport) -->

    <div id="detail-modal" class="detail-modal">
      <div class="modal-content">
        <button id="close-modal" class="close-btn">&#xD7;</button>
        <div id="train-detail"  class="train-detail"></div>
        <div id="station-board" class="station-board" style="display:none;"></div>
      </div>
    </div>

    <div id="railcam-modal" class="detail-modal">
      <div class="modal-content railcam-content">
        <button id="close-railcam-modal" class="close-btn">&#xD7;</button>
        <h3>Live Railcams</h3>
        <div class="railcam-controls">
          <input  id="railcam-search" type="text" placeholder="Search state, city, or cam…" />
          <select id="railcam-state"><option value="all">All states</option></select>
        </div>
        <div id="railcam-list" class="railcam-list"></div>
      </div>
    </div>

    <div id="settings-modal" class="detail-modal">
      <div class="modal-content settings-content">
        <button id="close-settings-modal" class="close-btn">&#xD7;</button>
        <h3>Settings</h3>
        <div class="settings-grid">
          <label class="settings-row" for="setting-refresh-interval">
            <span class="settings-title">Auto-refresh</span>
            <select id="setting-refresh-interval">
              <option value="10">Every 10 s</option>
              <option value="20">Every 20 s</option>
              <option value="30">Every 30 s</option>
              <option value="60">Every 60 s</option>
            </select>
          </label>
          <label class="settings-row" for="setting-map-style">
            <span class="settings-title">Map style</span>
            <select id="setting-map-style">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
              <option value="satellite">Satellite</option>
              <option value="topo">Topographic</option>
            </select>
          </label>
          <label class="settings-row" for="setting-theme-mode">
            <span class="settings-title">Theme</span>
            <select id="setting-theme-mode">
              <option value="dark">Dark</option>
              <option value="light">Light</option>
            </select>
          </label>
          <label class="settings-row toggle" for="setting-freight-lines">
            <span class="settings-title">Freight rail overlay</span>
            <input id="setting-freight-lines" type="checkbox" />
          </label>
          <label class="settings-row toggle" for="setting-search-open-default">
            <span class="settings-title">Keep search visible</span>
            <input id="setting-search-open-default" type="checkbox" />
          </label>
          <label class="settings-row toggle" for="setting-compact-cards">
            <span class="settings-title">Compact train cards</span>
            <input id="setting-compact-cards" type="checkbox" />
          </label>
        </div>
        <div class="settings-actions">
          <button id="save-settings" class="btn-primary">Save settings</button>
        </div>
      </div>
    </div>

    <div id="departure-board-modal" class="detail-modal">
      <div class="modal-content departure-board-content">
        <button id="close-departure-board-modal" class="close-btn">&#xD7;</button>
        <h3>Departure Board</h3>
        <div class="board-filters">
          <select id="departure-board-source">
            <option value="all">All Railroads</option>
          </select>
        </div>
        <div class="departure-board-grid departure-board-header">
          <span>Time</span><span>Train</span><span>Railroad</span>
          <span>Destination</span><span>Status</span><span>Track</span>
        </div>
        <div id="departure-board-rows"></div>
      </div>
    </div>

    <!-- Delay Detail Modal -->
    <div id="dq-detail-modal" class="detail-modal dq-detail-modal">
      <div class="modal-content dq-detail-content">
        <button id="close-dq-detail-modal" class="close-btn">&#xD7;</button>
        <div id="dq-detail-body"></div>
      </div>
    </div>

    <div id="sighting-modal" class="detail-modal">
      <div class="modal-content sighting-content">
        <button id="close-sighting-modal" class="close-btn">&#xD7;</button>
        <h3 id="sighting-modal-title">Upload Heritage Unit</h3>
        <form id="sighting-form" class="sighting-form">
          <input id="sighting-type" type="hidden" value="heritage" />
          <label class="settings-row" for="sighting-uploader-name">
            <span class="settings-title">Uploader name</span>
            <input id="sighting-uploader-name" type="text" placeholder="Your name or handle" required />
          </label>
          <label class="settings-row" for="sighting-state">
            <span class="settings-title">State</span>
            <select id="sighting-state" required>
              <option value="">Select a state</option>
            </select>
          </label>
          <label class="settings-row" for="sighting-city">
            <span class="settings-title">City</span>
            <select id="sighting-city" required disabled>
              <option value="">Select a state first</option>
            </select>
          </label>
          <label class="settings-row" for="sighting-train">
            <span class="settings-title">What train was it?</span>
            <input id="sighting-train" type="text" placeholder="Train number/name" required />
          </label>
          <label class="settings-row" for="sighting-railroad">
            <span class="settings-title">Railroad</span>
            <input id="sighting-railroad" type="text" placeholder="Amtrak, UP, BNSF, etc." />
          </label>
          <label class="settings-row" for="sighting-location">
            <span class="settings-title">Location (optional)</span>
            <input id="sighting-location" type="text" placeholder="City, station, crossing" />
          </label>
          <label class="settings-row" for="sighting-notes">
            <span class="settings-title">Notes</span>
            <textarea id="sighting-notes" placeholder="Anything special about this consist?" rows="3"></textarea>
          </label>
          <label class="settings-row" for="sighting-media">
            <span class="settings-title">Photo or video</span>
            <input id="sighting-media" type="file" accept="image/*,video/*" required />
          </label>
          <div class="settings-actions">
            <button id="sighting-use-location" type="button" class="btn-secondary">Use my location</button>
            <button type="submit" class="btn-primary">Upload</button>
          </div>
          <p id="sighting-status" class="sighting-status"></p>
        </form>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>
